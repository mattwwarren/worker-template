version: v2beta1
name: "worker-template"

vars:
  CLUSTER_NAME:
    default: "worker-template"
    source: env
  NAMESPACE:
    default: warren-enterprises-ltd
    source: env
  IMAGE_NAME:
    default: "worker-template"
    source: env
  APP_NAME:
    default: "worker-template"
    source: env
  ENVIRONMENT:
    default: dev
    source: env
  LOG_LEVEL:
    default: info
    source: env
  POSTGRES_DB:
    default: app
    source: env
  POSTGRES_USER:
    default: app
    source: env
  POSTGRES_PASSWORD:
    default: app
    source: env
  RABBITMQ_USER:
    default: guest
    source: env
  RABBITMQ_PASSWORD:
    default: guest
    source: env
  REDIS_PASSWORD:
    default: ""
    source: env

localRegistry:
  enabled: false

images:
  worker:
    image: ${IMAGE_NAME}
    dockerfile: ./Dockerfile
    skipPush: true
    injectRestartHelper: false

pipelines:
  deploy:
    run: |-
      if is_dependency; then
        bash scripts/devspace-banner.sh DEPENDENCY meta-workspace "Deploying: worker + scheduler"
        create_deployments worker scheduler
      else
        # Standalone: requires 'devspace run cluster-up' first to create cluster
        bash scripts/devspace-banner.sh STANDALONE worker-template "Deploying: all (infra + worker + scheduler)"
        build_images --all
        create_deployments --all
      fi
  dev:
    run: |-
      if is_dependency; then
        bash scripts/devspace-banner.sh DEPENDENCY meta-workspace "Dev service: worker"
        start_dev worker
      else
        # Standalone: requires 'devspace run cluster-up' first to create cluster
        bash scripts/devspace-banner.sh STANDALONE worker-template "Dev services: all"
        build_images --all
        create_deployments --all
        start_dev --all
      fi

dev:
  worker:
    namespace: ${NAMESPACE}
    imageSelector: ${runtime.images.worker.image}:${runtime.images.worker.tag}
    ports:
      - port: "8080"
    sync:
      - path: ./:/app
        excludeFile: .gitignore

hooks:
  - events: ["after:build"]
    command: |-
      if k3d cluster list | grep -q "^${CLUSTER_NAME} "; then
        k3d image import ${runtime.images.worker.image}:${runtime.images.worker.tag} -c ${CLUSTER_NAME}
      else
        echo "Skipping image import - cluster ${CLUSTER_NAME} not found (running as dependency)"
      fi

commands:
  cluster-up:
    description: "Create standalone cluster (run before deploy/dev)"
    command: bash
    args:
      - -c
      - |
        # Clear cache so DevSpace picks up new context
        rm -f .devspace/cache.yaml
        # Create cluster
        bash scripts/k3d-up.sh
        export KUBECONFIG="$(k3d kubeconfig write ${CLUSTER_NAME})"
        kubectl config use-context "k3d-${CLUSTER_NAME}"
        # Wait for cluster to be ready
        for _ in $(seq 1 30); do
          if kubectl get namespaces >/dev/null 2>&1; then
            break
          fi
          sleep 1
        done
        kubectl create namespace "${NAMESPACE}" 2>/dev/null || true
        bash scripts/ensure-db-secret.sh
        bash scripts/ensure-rabbitmq-secret.sh
        bash scripts/ensure-redis-secret.sh
        echo ""
        echo "Cluster ${CLUSTER_NAME} ready."
        echo "Next: run 'devspace deploy' or 'devspace dev'"
  alembic-revision:
    description: "Generate an Alembic migration (requires --message)"
    command: bash
    args:
      - -c
      - |
        if [ -z "$1" ]; then
          echo "Usage: devspace run alembic-revision -- \"your message\"" >&2
          exit 1
        fi
        devspace enter \
          --container worker \
          --namespace "${NAMESPACE}" \
          --label-selector "app.kubernetes.io/name=devspace-app,app.kubernetes.io/component=worker" \
          -- sh -lc 'uv run alembic revision --autogenerate -m "$1"' _ "$1"
      - --
  alembic-upgrade:
    description: "Run Alembic migrations against the dev cluster"
    command: bash
    args:
      - -c
      - |
        devspace enter \
          --container worker \
          --namespace "${NAMESPACE}" \
          --label-selector "app.kubernetes.io/name=devspace-app,app.kubernetes.io/component=worker" \
          -- sh -lc 'uv run alembic upgrade head'
  k3d-down:
    description: "Delete the local k3d cluster and clear cache"
    command: bash
    args:
      - -c
      - |
        bash scripts/k3d-down.sh
        rm -f .devspace/cache.yaml
        echo "Cache cleared"
  status:
    description: "Show pods, services, and deployments overview"
    command: bash
    args:
      - -c
      - |
        echo "=== Pods ==="
        kubectl get pods -n "${NAMESPACE}" -o wide 2>/dev/null || echo "No pods found (is the cluster running?)"
        echo ""
        echo "=== Services ==="
        kubectl get svc -n "${NAMESPACE}" 2>/dev/null || echo "No services found"
        echo ""
        echo "=== Deployments ==="
        kubectl get deployments -n "${NAMESPACE}" 2>/dev/null || echo "No deployments found"
        echo ""
        echo "=== StatefulSets ==="
        kubectl get statefulsets -n "${NAMESPACE}" 2>/dev/null || echo "No statefulsets found"
  health:
    description: "Check worker /health endpoint"
    command: bash
    args:
      - -c
      - |
        POD=$(kubectl get pod -n "${NAMESPACE}" \
          -l "app.kubernetes.io/name=devspace-app,app.kubernetes.io/component=worker" \
          -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        if [ -z "$POD" ]; then
          echo "No worker pod found. Is the app deployed?"
          echo "  Fix: devspace deploy"
          exit 1
        fi
        echo "Checking health on pod ${POD}..."
        kubectl exec -n "${NAMESPACE}" "$POD" -c worker -- \
          sh -c 'wget -qO- http://localhost:8080/health 2>/dev/null || curl -sf http://localhost:8080/health 2>/dev/null' \
          && echo "" && echo "Worker is healthy." \
          || { echo "Health check failed."; exit 1; }


# Deployment definitions

deployments:
  postgres:
    namespace: ${NAMESPACE}
    kubectl:
      manifests:
        - k8s/postgres-service.yaml
        - k8s/postgres-statefulset.yaml

  rabbitmq:
    namespace: ${NAMESPACE}
    kubectl:
      manifests:
        - k8s/rabbitmq-service.yaml
        - k8s/rabbitmq-deployment.yaml

  redis:
    namespace: ${NAMESPACE}
    kubectl:
      manifests:
        - k8s/redis-service.yaml
        - k8s/redis-deployment.yaml

  worker:
    namespace: ${NAMESPACE}
    helm:
      chart:
        name: component-chart
        repo: https://charts.devspace.sh
      values:
        containers:
          - name: worker
            image: ${runtime.images.worker.image}:${runtime.images.worker.tag}
            imagePullPolicy: IfNotPresent
            ports:
              - containerPort: 8080
            env:
              - name: POSTGRES_USER
                valueFrom:
                  secretKeyRef:
                    name: postgres-secret
                    key: POSTGRES_USER
              - name: POSTGRES_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: postgres-secret
                    key: POSTGRES_PASSWORD
              - name: POSTGRES_DB
                valueFrom:
                  secretKeyRef:
                    name: postgres-secret
                    key: POSTGRES_DB
              - name: RABBITMQ_USER
                valueFrom:
                  secretKeyRef:
                    name: rabbitmq-secret
                    key: RABBITMQ_USER
              - name: RABBITMQ_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: rabbitmq-secret
                    key: RABBITMQ_PASSWORD
              - name: REDIS_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: redis-secret
                    key: REDIS_PASSWORD
              - name: APP_NAME
                value: ${APP_NAME}
              - name: ENVIRONMENT
                value: ${ENVIRONMENT}
              - name: LOG_LEVEL
                value: ${LOG_LEVEL}
              - name: WORKER_CONCURRENCY
                value: "2"
              - name: DATABASE_URL
                value: postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres.${NAMESPACE}.svc.cluster.local:5432/$(POSTGRES_DB)
              - name: RABBITMQ_URL
                value: amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@rabbitmq.${NAMESPACE}.svc.cluster.local:5672/
              - name: REDIS_URL
                value: redis://:$(REDIS_PASSWORD)@redis.${NAMESPACE}.svc.cluster.local:6379/0
            readinessProbe:
              httpGet:
                path: /health
                port: 8080
              initialDelaySeconds: 10
              periodSeconds: 10
            livenessProbe:
              httpGet:
                path: /health
                port: 8080
              initialDelaySeconds: 15
              periodSeconds: 20
            resources:
              requests:
                cpu: "100m"
                memory: "256Mi"
              limits:
                cpu: "1000m"
                memory: "1Gi"
        labels:
          app.kubernetes.io/component: worker
        service:
          ports:
            - port: 8080
              targetPort: 8080

  scheduler:
    namespace: ${NAMESPACE}
    helm:
      chart:
        name: component-chart
        repo: https://charts.devspace.sh
      values:
        replicas: 1
        containers:
          - name: scheduler
            image: ${runtime.images.worker.image}:${runtime.images.worker.tag}
            imagePullPolicy: IfNotPresent
            command: ["sh", "scripts/start-scheduler.sh"]
            env:
              - name: RABBITMQ_USER
                valueFrom:
                  secretKeyRef:
                    name: rabbitmq-secret
                    key: RABBITMQ_USER
              - name: RABBITMQ_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: rabbitmq-secret
                    key: RABBITMQ_PASSWORD
              - name: REDIS_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: redis-secret
                    key: REDIS_PASSWORD
              - name: APP_NAME
                value: ${APP_NAME}
              - name: ENVIRONMENT
                value: ${ENVIRONMENT}
              - name: LOG_LEVEL
                value: ${LOG_LEVEL}
              - name: RABBITMQ_URL
                value: amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@rabbitmq.${NAMESPACE}.svc.cluster.local:5672/
              - name: REDIS_URL
                value: redis://:$(REDIS_PASSWORD)@redis.${NAMESPACE}.svc.cluster.local:6379/0
            resources:
              requests:
                cpu: "50m"
                memory: "64Mi"
              limits:
                cpu: "200m"
                memory: "256Mi"
        labels:
          app.kubernetes.io/component: scheduler
