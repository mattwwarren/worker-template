_min_copier_version: "9.0.0"
_templates_suffix: ""
_envops:
  keep_trailing_newline: true
_exclude:
  - "scripts/templatize.sh"
  - ".git"
  - ".git/**"
  - ".templatized"
  - ".templatized/**"
  - "REMEDIATION-STATUS.md"

project_name:
  type: str
  help: "Project name (e.g., 'Transcription Worker')"
  validator: "{% if not project_name %}Required{% endif %}"

project_slug:
  type: str
  help: "Python package name (auto-generated, lowercase with underscores)"
  default: "{{ project_name | lower | replace(' ', '_') | replace('-', '_') }}"

description:
  type: str
  help: "Brief project description"
  default: "A TaskIQ async worker service"

port:
  type: int
  help: "Health server port"
  default: 8080
  validator: "{% if port < 1024 or port > 65535 %}Port must be 1024-65535{% endif %}"

multi_tenant:
  type: bool
  help: "Enable tenant isolation via labels and DB filtering?"
  default: true

enable_metrics:
  type: bool
  help: "Enable Prometheus metrics endpoint at /metrics?"
  default: true

enable_scheduler:
  type: bool
  help: "Include scheduler deployment for cron jobs?"
  default: true

database_enabled:
  type: bool
  help: "Enable database access and TaskExecution tracking?"
  default: true

_tasks:
  - "python3 _tasks.py"

_message_after: |

  Project {{ project_name }} generated successfully!

  Quick Start:
    1. Edit .env - Set DATABASE_URL, RABBITMQ_URL, REDIS_URL
    2. Start worker:
       cd {{ _copier_conf.dst_path }}
       uv run taskiq worker {{ project_slug }}.worker:broker
    3. Health check: http://localhost:{{ port }}/health

  Configuration Summary:
    - Multi-tenant: {{ 'Enabled' if multi_tenant else 'Disabled' }}
    - Metrics: {{ 'Enabled at /metrics' if enable_metrics else 'Disabled' }}
    - Scheduler: {{ 'Enabled' if enable_scheduler else 'Disabled' }}
    - Database: {{ 'Enabled' if database_enabled else 'Disabled' }}

  Next Steps:
    - Add your task contracts in {{ project_slug }}/tasks/contracts.py
    - Create task implementations in {{ project_slug }}/tasks/
    - Configure schedules via @broker.task(schedule=[...])
